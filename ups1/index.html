<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clase de Bienvenida - NervioZen</title>
    <meta name="description" content="Tu acceso está en camino, pero antes mira esta clase de bienvenida obligatoria.">
    <link rel="icon" type="image/webp" href="../favicon/favicon-96x96.webp" sizes="96x96">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #F4F5F7;
            --text: #0F172A;
            --text-secondary: #4A4A4A;
            --alert-bg: #CC1212;
            --alert-text: #FFFFFF;
            --accent-green: #10B981;
            --font-main: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Top Warning Bar */
        .top-bar {
            background-color: var(--alert-bg);
            color: var(--alert-text);
            text-align: center;
            padding: 14px 16px;
            font-size: 14px;
            font-weight: 800;
        }

        /* Container & Layout */
        .container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 24px 16px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Headline */
        .headline {
            font-size: 24px;
            font-weight: 900;
            text-align: center;
            color: var(--text);
            line-height: 1.3;
            margin-bottom: 24px;
        }
        
        @media (min-width: 768px) {
            .headline { font-size: 32px; }
        }

        .headline span {
            color: var(--alert-text);
        }

        /* Video Section */
        .video-container {
            width: 100%;
            max-width: 400px; /* Mobile focused max-width as requested by vturb snippet */
            position: relative;
            margin-bottom: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            background: #000;
            overflow: hidden;
        }

        @media (max-width: 480px) {
            .video-container {
                max-width: 100%;
                border-radius: 8px;
            }
        }

        /* Delay Section */
        #delayed-offer-container {
            display: none; /* Hidden strictly by default */
            width: 100%;
            max-width: 600px;
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Block B: Hotmart Widget Wrapper */
        .hotmart-widget-container {
            width: 100%;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <!-- Header Alert -->
    <div class="top-bar">
        ⚠️ ¡ESPERA! Tu orden aún no está completa. No cierres ni actualices esta página.
    </div>

    <div class="container">
        <!-- Pre-Headline -->
        <div style="font-size: 12px; font-weight: 800; color: #64748B; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 24px; text-align: center; border-bottom: 1px solid #CBD5E1; padding-bottom: 8px; width: max-content; margin-left: auto; margin-right: auto;">
            PASO 2 DE 3: PERSONALIZANDO TU ACCESO... <span style="color: #10B981; font-size: 14px;">●</span>
        </div>

        <!-- Headline -->
        <h1 class="headline" style="color: #0F172A; max-width: 700px;">
            Por favor, mira este breve video de <span style="color: #DC2626;">bienvenida e instrucciones</span> antes de acceder a tu material:
        </h1>

        <!-- Video Vturb -->
        <div class="video-container">
            <vturb-smartplayer id="vid-69fe0073660e8c12a98bf160" style="display: block; margin: 0 auto; width: 100%; max-width: 400px;"></vturb-smartplayer>
            <script type="text/javascript">
                var s=document.createElement("script");
                s.src="https://scripts.converteai.net/42261601-8a34-4f77-a137-eb1c7e8f3964/players/69fe0073660e8c12a98bf160/v4/player.js";
                s.async=!0;
                document.head.appendChild(s); 
            </script>
        </div>

        <!-- Delay Offer -->
        <div id="delayed-offer-container">
            <!-- Block B: Hotmart Upsell Widget -->
            <div class="hotmart-widget-container" id="widget-tracker">
                <!-- HOTMART - Sales Funnel Widget -->
                <div id="hotmart-sales-funnel"></div>
                
                <script src="https://checkout.hotmart.com/lib/hotmart-checkout-elements.js"></script>
                <script>
                if (typeof checkoutElements !== 'undefined') {
                    checkoutElements.init('salesFunnel').mount('#hotmart-sales-funnel');
                } else {
                    window.addEventListener('load', function() {
                        checkoutElements.init('salesFunnel').mount('#hotmart-sales-funnel');
                    });
                }
                </script>
                <!-- HOTMART - Sales Funnel Widget -->
            </div>
        </div>
    </div>

    <!-- Script de Delay (5 minutos e 35 segundos = 335 segundos) -->
    <script>
        const DELAY_IN_SECONDS = 335;
        const DELAY_IN_MS = DELAY_IN_SECONDS * 1000;

        setTimeout(function() {
            var decisionZone = document.getElementById('delayed-offer-container');
            if(decisionZone) {
                decisionZone.style.display = 'block';
            }
        }, DELAY_IN_MS);
    </script>
    <script>var PAGE_ID='upsell1';</script>
    <script src="../tracker.js"></script>
</body>
</html>
